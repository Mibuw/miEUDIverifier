name: Publish miEUDIverifier.Core to NuGet

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Package version, e.g. 1.0.0"
        required: true

jobs:
  pack-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Determine version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          fi

      - name: Pack
        run: |
          dotnet pack src/miEUDIverifier.Core/miEUDIverifier.Core.csproj \
            -c Release -o out \
            -p:PackageId=miEUDIverifier.Core \
            -p:Version=$VERSION \
            -p:Authors="Wolfgang Mitterbucher" \
            -p:Description="Reusable .NET 8 library to read EUDI Wallet PID identity data via the EUDI Verifier Backend REST API (OpenID4VP). Includes DCQL request building, polling and identity data extraction." \
            -p:PackageLicenseExpression=Apache-2.0 \
            -p:PackageProjectUrl=https://github.com/Mibuw/miEUDIverifier \
            -p:RepositoryUrl=https://github.com/Mibuw/miEUDIverifier \
            -p:RepositoryType=git \
            -p:PackageTags="eudi;eudi-wallet;openid4vp;eidas2;digital-identity;verifiable-credentials;pid"

      - name: Push to NuGet.org
        run: |
          dotnet nuget push "out/*.nupkg" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicates
