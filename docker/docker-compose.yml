# ──────────────────────────────────────────────────────────────────────────────
# EUDI Verifier Backend – local development stack
#
# BACKGROUND:
#   https://verifier.eudiw.dev  is the public frontend URL (Angular SPA).
#   The backend (Spring Boot REST API) is not directly reachable publicly.
#   For your own applications the backend has to be started locally.
#
# SETUP:
#   1. Determine your machine's LAN IP (ipconfig / ip addr)
#   2. Set VERIFIER_PUBLICURL in this file to the LAN IP (see below)
#   3. docker compose up -d
#   4. In appsettings.json: BackendUrl = "http://<LAN-IP>:8080"
#      (or as an argument: dotnet run -- --VerifierSettings:BackendUrl=http://<LAN-IP>:8080)
#
# WHY THE LAN IP?
#   The QR code contains request_uri=http://<VERIFIER_PUBLICURL>/wallet/request.jwt/...
#   The EUDI Wallet App on the phone must be able to reach this URL.
#   With "localhost" the phone would talk to its own localhost – not the PC.
#
# EXAMPLE (LAN IP 192.168.1.42):
#   VERIFIER_PUBLICURL: "http://192.168.1.42:8080"
#   BackendUrl in appsettings.json: "http://192.168.1.42:8080"
# ──────────────────────────────────────────────────────────────────────────────
version: "3.9"

services:
  verifier-backend:
    image: ghcr.io/eu-digital-identity-wallet/eudi-srv-verifier-endpoint:latest
    container_name: eudi-verifier-backend
    ports:
      - "8080:8080"
    environment:
      # !! ADJUST: enter your machine's LAN IP, e.g. http://192.168.1.42:8080
      # This lets the EUDI Wallet App on the phone fetch the request_uri from the QR code.
      VERIFIER_PUBLICURL: "http://192.168.100.55:8080"

      VERIFIER_RESPONSE_MODE: "DirectPost"
      VERIFIER_REQUESTJWT_EMBED: "ByReference"
      VERIFIER_REQUESTJWT_REQUESTURIMETHOD: "Post"

      # Accept all issuers (development only – do not use in production!)
      VERIFIER_ATTESTATIONCLASSIFICATIONS: >-
        {"pid":{"vcts":["urn:eudi:pid:1"],"docTypes":["eu.europa.ec.eudi.pid.1"]},
         "qeaa":{"vcts":[],"docTypes":[]},
         "pubeaa":{"vcts":[],"docTypes":[]},
         "eaa":[{"useCase":"mDL","vcts":[],"docTypes":["org.iso.18013.5.1.mDL"]}]}

      CORS_ORIGINS: "*"
      CORS_METHODS: "*"
      CORS_HEADERS: "*"
      SPRING_PROFILES_ACTIVE: "self-signed"

    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  verifier-ui:
    image: ghcr.io/eu-digital-identity-wallet/eudi-web-verifier:latest
    container_name: eudi-verifier-ui
    ports:
      - "4200:80"
    environment:
      # The verifier UI shows the same backend status as the C# app
      VERIFIER_API_URL: "http://localhost:8080"
    depends_on:
      verifier-backend:
        condition: service_healthy

  # ── miEUDIverifier app ──────────────────────────────────────────────────────
  # Builds the image from the Dockerfile in the repo root and starts the web app.
  # Reachable at http://localhost:5050
  mieudiverifier-app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: mieudiverifier-app
    restart: unless-stopped
    ports:
      - "5050:5050"
    environment:
      # Use the local backend inside the compose network (instead of the public server).
      # To use the public backend, comment out this line.
      EUDI_VerifierSettings__BackendUrl: "http://verifier-backend:8080"
    depends_on:
      verifier-backend:
        condition: service_healthy
